

services:
  #php container
  app:
    build: .
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=myuser
      - DB_PASSWORD=secret
      - DB_NAME=my_database

  #nginx
  web:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: my_database
      MYSQL_USER: myuser
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

volumes:
  db_data: #объявляем именованый том

  
